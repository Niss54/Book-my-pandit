name: book_my_pandit
description: A new Flutter project.
prublish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  razorpay_flutter: ^1.4.3
  go_router: ^17.1.0
  provider: ^6.1.5+1
  google_sign_in: ^7.2.0
  sentry_flutter: ^8.14.2
  get_it: ^9.2.1
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/om_logo.png
    - assets/images/google_logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/om_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFF6ED"
  image: assets/images/om_logo.png
  android: true
  ios: true
